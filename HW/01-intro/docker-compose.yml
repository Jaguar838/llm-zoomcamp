version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.4.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - .:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 6G  # Збільшити обсяг оперативної пам'яті до 6ГБ
          cpus: '2.0'  # Обмежити кількість процесорних ядер